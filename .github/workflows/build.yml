name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets (Vite)
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ========== STABILKAN SHA-1 DEBUG KEY ==========
      - name: Create fixed debug keystore (for consistent SHA-1)
        run: |
          mkdir -p ~/.android
          # Buat debug keystore dengan password tetap dan alias tetap
          # SHA-1 akan selalu sama selama password, alias, dan CN tidak berubah
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US" \
            -storepass android \
            -keypass android \
            -noprompt
        # Catatan: Jika file sudah ada, keytool akan error, tapi itu tidak masalah.
        # Kita hanya ingin memastikan keystore konsisten.
        continue-on-error: true

      - name: Get SHA-1 from fixed debug keystore
        run: |
          SHA1=$(keytool -list -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey | grep -i "SHA1" | cut -d ':' -f2- | tr -d ' ')
          echo "DEBUG_SHA1=$SHA1" >> $GITHUB_ENV
          echo "SHA-1 fingerprint: $SHA1"
          # (Opsional) Simpan ke artifact agar bisa dilihat
          echo $SHA1 > debug_sha1.txt
      - name: Upload SHA-1 info
        uses: actions/upload-artifact@v4
        with:
          name: debug-sha1
          path: debug_sha1.txt

      # ========== BUILD DEBUG APK ==========
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # ========== BUILD RELEASE APK (jika ada secrets) ==========
      - name: Build Release APK (if keystore secrets exist)
        if: secrets.KEYSTORE_BASE64 != '' && secrets.KEYSTORE_PASSWORD != '' && secrets.KEY_ALIAS != '' && secrets.KEY_PASSWORD != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          cd android
          ./gradlew assembleRelease
        env:
          ORG_GRADLE_PROJECT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        if: secrets.KEYSTORE_BASE64 != '' && secrets.KEYSTORE_PASSWORD != '' && secrets.KEY_ALIAS != '' && secrets.KEY_PASSWORD != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

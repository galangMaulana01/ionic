name: Ionic

on:
  push:
    branches: [ main ]
  workflow_dispatch: # bisa trigger manual dari GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4. Build web assets (vite build)
      - name: Build web
        run: npm run build

      # 5. Setup Java (dibutuhkan Gradle/Android)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 6. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 7. Sync Capacitor ke Android
      - name: Capacitor sync
        run: npx cap sync android

      # 8. Beri permission ke gradlew
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 9. Build APK debug (tidak perlu keystore)
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # 10. Upload APK sebagai artifact (bisa didownload dari GitHub)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: indoscore-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
